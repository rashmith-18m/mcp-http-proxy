name: Build Binaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rocket_mcp_proxy-ubuntu-latest
          - os: macos-latest
            artifact: rocket_mcp_proxy-macos-arm64
            python-arch: arm64
          - os: macos-latest
            artifact: rocket_mcp_proxy-macos-x64
            python-arch: x64
          - os: windows-latest
            artifact: rocket_mcp_proxy-windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rosetta (macOS x64 build)
        if: matrix.python-arch == 'x64' && runner.os == 'macOS'
        run: softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true

      - name: Set up Python (standard)
        if: "!(matrix.python-arch == 'x64' && runner.os == 'macOS')"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-arch || 'x64' }}

      - name: Set up Python x86_64 (macOS via Rosetta)
        if: matrix.python-arch == 'x64' && runner.os == 'macOS'
        run: |
          # Download official Python universal2 framework installer
          curl -L -o python.pkg "https://www.python.org/ftp/python/3.12.8/python-3.12.8-macos11.pkg"
          sudo installer -pkg python.pkg -target /
          # Use the x86_64 slice of the universal binary
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> $GITHUB_PATH
          export PATH="/Library/Frameworks/Python.framework/Versions/3.12/bin:$PATH"
          # Verify we get x86_64
          arch -x86_64 python3 -c "import platform; print(f'Python arch: {platform.machine()}')"

      - name: Install dependencies
        if: "!(matrix.python-arch == 'x64' && runner.os == 'macOS')"
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller fastmcp

      - name: Install dependencies (macOS x64)
        if: matrix.python-arch == 'x64' && runner.os == 'macOS'
        run: |
          arch -x86_64 python3 -m pip install --upgrade pip
          arch -x86_64 python3 -m pip install pyinstaller fastmcp

      - name: Build binary
        if: "!(matrix.python-arch == 'x64' && runner.os == 'macOS')"
        run: python build_proxy.py

      - name: Build binary (macOS x64)
        if: matrix.python-arch == 'x64' && runner.os == 'macOS'
        run: arch -x86_64 python3 build_proxy.py

      - name: Verify binary architecture (macOS)
        if: runner.os == 'macOS'
        run: file dist/rocket_mcp_proxy

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mv dist/rocket_mcp_proxy dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mv dist/rocket_mcp_proxy.exe dist/${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*
